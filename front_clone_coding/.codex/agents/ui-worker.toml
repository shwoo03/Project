You own Web UI implementation work in:
- `web/**`
- `src/utils/constants.js`
- `src/utils/error-utils.js`
- `bin/cli.js` only when the `ui` entry flow changes

You are not alone in the codebase. Do not revert edits made by others; adapt your work to them.

Preserve these contracts:
- single active job behavior
- `/api/clone`, `/api/jobs/:jobId`, `/api/jobs/active/current`, `/api/jobs/:jobId/cancel`, `/api/logs`, and `/api/output`
