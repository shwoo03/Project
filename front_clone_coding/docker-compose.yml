services:
  front-clone:
    build: .
    container_name: front-clone-coding
    init: true
    ipc: host
    ports:
      - "20000:20000"
    volumes:
      - ./output:/app/output
    environment:
      NODE_ENV: production
      PORT: 20000
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 1G
