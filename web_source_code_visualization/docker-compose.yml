version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: source-viz-backend
    ports:
      - "10003:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
      - /app/__pycache__
      - ./projects:/projects
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - source-viz-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://code.xn--9t4ba122aba.site}
    container_name: source-viz-frontend
    ports:
      - "10004:3000"
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-https://code.xn--9t4ba122aba.site}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - source-viz-net

  redis:
    image: redis:7-alpine
    container_name: source-viz-redis
    ports:
      - "10005:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - source-viz-net

volumes:
  redis_data:


networks:
  source-viz-net:
    driver: bridge
