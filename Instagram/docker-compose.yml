version: '3.8'

services:
  instagram-tracker:
    build: .
    container_name: instagram-tracker
    ports:
      - "10000:10000"
    environment:
      - TZ=Asia/Seoul
      - USER_ID=${USER_ID}
      - USER_PASSWORD=${USER_PASSWORD}
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/}
      - DISCORD_WEBHOOK=${DISCORD_WEBHOOK:-}
      - ACCESS_PASSWORD=${ACCESS_PASSWORD:-shwoo2026}
      - SHWOO_URL=${SHWOO_URL:-https://shwoo.site}
    volumes:
      - ./cookies.json:/app/cookies.json
    depends_on:
      - mongo
    restart: unless-stopped
    networks:
      - instagram-net

  mongo:
    image: mongo:7
    container_name: instagram-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - instagram-net
    restart: unless-stopped

volumes:
  mongo-data:


networks:
  instagram-net:
    driver: bridge
