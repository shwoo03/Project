services:
  ai-news-bot:
    build: .
    container_name: ai-news-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # SQLite DB 영속화
      - ./data:/app/data
      # 텔레그램 세션 파일 마운트
      - ./data/sessions:/app/data/sessions
      # 설정 파일 (hot-reload 가능)
      - ./config:/app/config:ro
    environment:
      - TZ=Asia/Seoul
    # 리소스 제한 (사내망 서버 기준)
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # (선택) 즉시 실행용 — docker-compose run --rm runner
  runner:
    build: .
    container_name: ai-news-runner
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./data/sessions:/app/data/sessions
      - ./config:/app/config:ro
    environment:
      - TZ=Asia/Seoul
    command: ["python", "scripts/run_once.py"]
    profiles:
      - manual
