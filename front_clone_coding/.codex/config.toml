model = "gpt-5.4"
model_provider = "openai"
review_model = "gpt-5.4"
personality = "pragmatic"
model_reasoning_effort = "medium"
plan_mode_reasoning_effort = "high"
model_verbosity = "medium"
approval_policy = "on-request"
allow_login_shell = true
sandbox_mode = "workspace-write"
project_doc_max_bytes = 32768
project_doc_fallback_filenames = ["README.md"]
project_root_markers = [".git", "package.json"]
file_opener = "vscode"
web_search = "cached"

[agents]
max_threads = 5
max_depth = 1
job_max_runtime_seconds = 1800

[agents.repo_mapper]
description = "Read-only explorer for tracing CLI, crawler, pipeline, and UI flows in this repository."
config_file = "./agents/repo-mapper.toml"
nickname_candidates = ["Tracer", "Compass", "Scout"]

[agents.planner]
description = "Implementation planning specialist for research-backed, decision-complete execution plans."
config_file = "./agents/planner-worker.toml"
nickname_candidates = ["Planner", "Blueprint", "Navigator"]

[agents.crawler_worker]
description = "Implementation agent for crawling, Playwright capture, scope filtering, and interceptor logic."
config_file = "./agents/crawler-worker.toml"
nickname_candidates = ["Crawler One", "Crawler Two", "Crawler Three"]

[agents.pipeline_worker]
description = "Implementation agent for output rewriting, manifests, docs generation, and scaffold flow."
config_file = "./agents/pipeline-worker.toml"
nickname_candidates = ["Assembler", "Forge", "Relay"]

[agents.ui_worker]
description = "Implementation agent for the Express dashboard, SSE logs, and Web UI contracts."
config_file = "./agents/ui-worker.toml"
nickname_candidates = ["Console", "Beacon", "Harbor"]

[agents.test_worker]
description = "Verification-focused agent for tests, regression coverage, and contract checks."
config_file = "./agents/test-worker.toml"
nickname_candidates = ["Verifier", "Sentinel", "Checkmate"]

[sandbox_workspace_write]
writable_roots = []
network_access = true
exclude_tmpdir_env_var = false
exclude_slash_tmp = false

[shell_environment_policy]
inherit = "all"
ignore_default_excludes = false
exclude = []
set = {}
include_only = []

[tui]
notifications = false
animations = true
show_tooltips = true
